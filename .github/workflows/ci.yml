name: CI

# run the test suite on every push and PR so regressions are caught per-commit,
# not just at release time (the Deploy workflow only runs on release/dispatch)
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    defaults:
      run:
        shell: bash -l {0}        # login shell so the conda env stays activated
    steps:
      - uses: actions/checkout@v4
      # the cytools stack needs conda-forge C-extension libs to import, so set
      # up the env from environment.yml (mirrors cytools' own CI) rather than a
      # bare pip install
      - uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          create-args: >-
            python=${{ matrix.python-version }}
      - name: Install fanroots
        run: pip install -e ".[test]"
      - name: Run tests
        run: pytest -vv tests
